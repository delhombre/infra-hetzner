---
- name: "All servers"
  hosts: all
  become: true
  vars_files:
    - vars/main.yaml
  tasks:
    - name: "Common OS tasks"
      ansible.builtin.include_role:
        name: os_common

    - name: "Firewall tasks"
      ansible.builtin.include_role:
        name: firewall

    - name: "Docker install"
      ansible.builtin.include_role:
        name: docker_install
