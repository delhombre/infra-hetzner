---
- name: Check if Sealed Secrets controller is installed
  ansible.builtin.command:
    cmd: kubectl get deployment sealed-secrets-controller -n kube-system
  register: sealed_secrets_check
  failed_when: false
  changed_when: false

- name: Install Sealed Secrets controller
  ansible.builtin.command:
    cmd: kubectl apply -f {{ sealed_secrets_controller_url }}
  when: sealed_secrets_check.rc != 0
  changed_when: true

- name: Wait for Sealed Secrets controller to be ready
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=Available deployment/sealed-secrets-controller -n kube-system --timeout=120s
  when: sealed_secrets_check.rc != 0
  changed_when: false

- name: Display instructions
  ansible.builtin.debug:
    msg: |
      ✅ Sealed Secrets controller installed!

      On your LOCAL machine, install kubeseal:
        brew install kubeseal

      Then fetch the public key:
        kubeseal --fetch-cert --controller-name=sealed-secrets-controller --controller-namespace=kube-system > sealed-secrets.pem
