---
- name: Ensure monitoring namespace exists
  ansible.builtin.shell:
    cmd: set -o pipefail && kubectl create namespace {{ grafana_namespace }} --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: grafana_ns_result
  changed_when: "'created' in grafana_ns_result.stdout"

- name: Add Grafana Helm repository
  ansible.builtin.command:
    cmd: helm repo add grafana https://grafana.github.io/helm-charts
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: grafana_helm_repo_add
  changed_when: "'has been added' in grafana_helm_repo_add.stdout"
  failed_when: false

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Check if Grafana is already installed
  ansible.builtin.command:
    cmd: helm status grafana -n {{ grafana_namespace }}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: grafana_status
  failed_when: false
  changed_when: false

- name: Get current Grafana chart version
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      helm list -n {{ grafana_namespace }} -o json | grep -o '"chart":"grafana-[^"]*"' | sed 's/.*grafana-//' | sed 's/"//' || echo "none"
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: grafana_current_version
  changed_when: false
  when: grafana_status.rc == 0

- name: Create temp directory for Helm values
  ansible.builtin.tempfile:
    state: directory
  register: grafana_temp_dir
  changed_when: false

- name: Template Grafana Helm values
  ansible.builtin.template:
    src: values.yaml.j2
    dest: "{{ grafana_temp_dir.path }}/values.yaml"
    mode: "0644"
  changed_when: false

- name: Install Grafana via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install grafana grafana/grafana
      --namespace {{ grafana_namespace }}
      --version {{ grafana_chart_version }}
      --values {{ grafana_temp_dir.path }}/values.yaml
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: grafana_status.rc != 0
  register: grafana_install_result
  changed_when: true

- name: Upgrade Grafana via Helm (if version changed)
  ansible.builtin.command:
    cmd: >
      helm upgrade grafana grafana/grafana
      --namespace {{ grafana_namespace }}
      --version {{ grafana_chart_version }}
      --values {{ grafana_temp_dir.path }}/values.yaml
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - grafana_status.rc == 0
    - grafana_current_version.stdout | default('none') != grafana_chart_version
  register: grafana_upgrade_result
  changed_when: true

- name: Cleanup temp directory
  ansible.builtin.file:
    path: "{{ grafana_temp_dir.path }}"
    state: absent
  changed_when: false

- name: Wait for Grafana to be ready
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=Available deployment/grafana -n {{ grafana_namespace }} --timeout=180s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Display Grafana access information
  ansible.builtin.debug:
    msg: |
      ✅ Grafana deployed successfully!

      🌐 URL: https://{{ grafana_hostname }}
      👤 User: {{ grafana_admin_user }}
      🔑 Password: {{ grafana_admin_password }}

      📊 Pre-configured dashboards:
        - Kubernetes Cluster
        - Node Exporter
        - Kubernetes Pods
