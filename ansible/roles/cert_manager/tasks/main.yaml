---
- name: Check if cert-manager is already installed
  ansible.builtin.command:
    cmd: kubectl get namespace cert-manager
  register: cert_manager_ns_check
  failed_when: false
  changed_when: false

- name: Install cert-manager CRDs and resources
  ansible.builtin.command:
    cmd: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml
  when: cert_manager_ns_check.rc != 0
  changed_when: true

- name: Wait for cert-manager to be ready
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=120s
  when: cert_manager_ns_check.rc != 0
  changed_when: false

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.pause:
    seconds: 30
  when: cert_manager_ns_check.rc != 0

- name: Create temp directory for manifests
  ansible.builtin.tempfile:
    state: directory
  register: cert_manager_temp_dir
  when: cert_manager_email | length > 0

- name: Template ClusterIssuer staging
  ansible.builtin.template:
    src: clusterissuer-staging.yaml.j2
    dest: "{{ cert_manager_temp_dir.path }}/clusterissuer-staging.yaml"
    mode: "0644"
  when: cert_manager_email | length > 0

- name: Template ClusterIssuer production
  ansible.builtin.template:
    src: clusterissuer-prod.yaml.j2
    dest: "{{ cert_manager_temp_dir.path }}/clusterissuer-prod.yaml"
    mode: "0644"
  when: cert_manager_email | length > 0

- name: Apply ClusterIssuer staging
  ansible.builtin.command:
    cmd: kubectl apply -f {{ cert_manager_temp_dir.path }}/clusterissuer-staging.yaml
  when: cert_manager_email | length > 0
  changed_when: true

- name: Apply ClusterIssuer production
  ansible.builtin.command:
    cmd: kubectl apply -f {{ cert_manager_temp_dir.path }}/clusterissuer-prod.yaml
  when: cert_manager_email | length > 0
  changed_when: true

- name: Cleanup temp directory
  ansible.builtin.file:
    path: "{{ cert_manager_temp_dir.path }}"
    state: absent
  when: cert_manager_email | length > 0
