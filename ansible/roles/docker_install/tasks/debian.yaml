---
- name: (Debian) Install necessary packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: (Debian) Create Docker keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: (Debian) Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: (Debian) Get system architecture
  ansible.builtin.command:
    cmd: dpkg --print-architecture
  register: docker_install_dpkg_architecture
  changed_when: false

- name: (Debian) Get Debian version codename
  ansible.builtin.shell:
    cmd: . /etc/os-release && echo "$VERSION_CODENAME"
  register: docker_install_debian_codename
  changed_when: false

- name: (Debian) Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_install_dpkg_architecture.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ docker_install_debian_codename.stdout }} stable
    state: present
    filename: docker

- name: (Debian) Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - python3-docker
      - python3-jsondiff
      - python3-pretty-yaml
      - python3-pyyaml-env-tag
    state: present
    update_cache: true
